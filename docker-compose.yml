version: "3.8"

services:
  stock-data-features:
    build: .
    container_name: stock-data-features
    restart: unless-stopped
    environment:
      - APP_BASE_DIR=/app
      - FEATURES_API_PORT=8003
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - NUMEXPR_NUM_THREADS=1
    volumes:
      # Config (features.json and settings.json live here)
      - /home/daniel/stock-data-features/config:/app/config
      # Shared parquet data (read OHLCV, write *_features.parquet)
      - /home/daniel/stock-data-node/data:/app/data
      # Log files
      - /home/daniel/stock-data-features/logs:/app/logs
      # Static UI files
      - /home/daniel/stock-data-features/static:/app/static
    network_mode: "host"
    tty: true
